<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Expense Tracker</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container mt-5">

    <h1 class="text-center mb-4">Daily Expense Tracker</h1>


    <div class="card p-4 shadow">

        <form id="expenseForm">

            <div class="mb-3">
                <label class="form-label">Expense Name</label>
                <input type="text" id="expenseName" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Amount ($)</label>
                <input type="number" id="expenseAmount" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Category</label>

                <select id="expenseCategory" class="form-control">
                    <option>Food</option>
                    <option>Transport</option>
                    <option>Shopping</option>
                    <option>Bills</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                Add Expense
            </button>

        </form>

    </div>


    <div class="total-box mt-4">
        <h3>Total Expenses: $<span id="totalAmount">0</span></h3>
    </div>

    
    <div id="expenseList" class="mt-4"></div>

</div>
<script src="https://cdn.jsdelivr.net/npm/axios@1.16.1/dist/axios.min.js"></script>

<script src="script.js"></script>
<button id="saveBtn">Save</button>
</body>
</html>
